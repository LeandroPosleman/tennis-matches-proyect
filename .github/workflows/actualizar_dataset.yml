name: Actualizar dataset ATP

on:
  schedule:
    - cron: "0 12 * * 1"  # Lunes 9:00am BsAs (UTC-3)
  workflow_dispatch:       # Permite ejecutarlo manualmente

concurrency:
  group: actualizar-dataset
  cancel-in-progress: true

jobs:
  actualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sincronizar con origin/master
        run: git reset --hard origin/master

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install kaggle pandas

      - name: Configurar credenciales Kaggle
        run: |
          mkdir -p ~/.kaggle
          echo '{"username":"${{ secrets.KAGGLE_USERNAME }}","key":"${{ secrets.KAGGLE_KEY }}"}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      - name: Descargar y actualizar dataset
        run: python scripts/actualizar_dataset.py

      - name: Regenerar matches_challenger_atp.csv
        run: |
          python -c "
          import pandas as pd
          df_combined = pd.read_csv('data/matches_challenger_atp.csv', low_memory=False)
          df_challenger = df_combined[df_combined['Series'] == 'Challenger'].copy()
          df_atp = pd.read_csv('data/matches_atp.csv', low_memory=False)
          df_new = pd.concat([df_atp, df_challenger], ignore_index=True)
          df_new['Date'] = pd.to_datetime(df_new['Date'], errors='coerce')
          df_new = df_new.sort_values('Date').reset_index(drop=True)
          df_new['Date'] = df_new['Date'].dt.strftime('%Y-%m-%d')
          df_new.to_csv('data/matches_challenger_atp.csv', index=False)
          print(f'matches_challenger_atp.csv regenerado: {len(df_new)} filas')
          "

      - name: Actualizar README.md y CLAUDE.md
        run: |
          TOTAL=$(python -c "import csv; f=open('data/matches_atp.csv'); r=csv.reader(f); next(r); rows=list(r); print(len(rows))")
          FECHA=$(python -c "import csv; f=open('data/matches_atp.csv'); r=csv.reader(f); next(r); rows=list(r); print(rows[-1][1])")

          echo "Total de partidos: $TOTAL"
          echo "Ultimo partido: $FECHA"

          python -c "
          import re, pathlib
          content = pathlib.Path('README.md').read_text(encoding='utf-8')
          total = '$TOTAL'
          fecha = '$FECHA'
          content = re.sub(
              r'El archivo data/matches_atp\.csv contiene ~[\d\.]+ partidos[^.]*\.',
              f'El archivo data/matches_atp.csv contiene ~{int(total):,} partidos hasta {fecha}.'.replace(',', '.'),
              content
          )
          pathlib.Path('README.md').write_text(content, encoding='utf-8')
          "

          python -c "
          import re, pathlib
          content = pathlib.Path('CLAUDE.md').read_text(encoding='utf-8')
          total = '$TOTAL'
          fecha = '$FECHA'
          content = re.sub(r'- \*\*Hasta:\*\*.*', f'- **Hasta:** {fecha} (ultima entrada registrada)', content)
          content = re.sub(r'- \*\*Total de partidos:\*\*.*', f'- **Total de partidos:** ~{int(total):,} filas'.replace(',', '.'), content)
          pathlib.Path('CLAUDE.md').write_text(content, encoding='utf-8')
          "

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet data/matches_atp.csv; then
            echo "No hubo cambios en el dataset, no se hace commit."
          else
            FECHA=$(python -c "import csv; f=open('data/matches_atp.csv'); r=csv.reader(f); next(r); rows=list(r); print(rows[-1][1])")

            # Guardar archivos actualizados en /tmp
            cp data/matches_atp.csv /tmp/matches_atp.csv
            cp data/matches_challenger_atp.csv /tmp/matches_challenger_atp.csv
            cp README.md /tmp/README.md
            cp CLAUDE.md /tmp/CLAUDE.md

            # Reintentar hasta 5 veces por si hay conflicto de push
            for i in 1 2 3 4 5; do
              echo "Intento $i de push..."
              git fetch origin
              git reset --hard origin/master
              cp /tmp/matches_atp.csv data/matches_atp.csv
              cp /tmp/matches_challenger_atp.csv data/matches_challenger_atp.csv
              cp /tmp/README.md README.md
              cp /tmp/CLAUDE.md CLAUDE.md
              git add data/matches_atp.csv data/matches_challenger_atp.csv README.md CLAUDE.md
              git commit -m "chore: actualizar dataset a $FECHA [lunes automatico]"
              git push && echo "Push exitoso." && break
              echo "Push fallido, reintentando..."
              git reset --soft HEAD~1
            done
          fi
